name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - run: dotnet build -c Release -warnaserror
      - run: dotnet test -c Release --no-build --filter "Category!=Endurance&Category!=Stress&Category!=Perf"
      - run: dotnet pack -c Release --no-build -o ./artifacts
      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source "https://nuget.pkg.github.com/brunomaida/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: ./artifacts
