name: Build & Test
on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.x'
      - run: dotnet build -c Release -warnaserror
      - run: dotnet test -c Release --no-build --logger "console;verbosity=minimal" --filter "Category!=Endurance&Category!=Stress&Category!=Perf"
